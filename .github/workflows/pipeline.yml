name: Analytics Pipeline

on:
  schedule:
    - cron: '0 8 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas requests beautifulsoup4 openpyxl dbt-duckdb duckdb

      - name: Run ingestion
        run: python scripts/ingest_data.py

      - name: Prepare seeds
        run: python scripts/prepare_seeds.py

      - name: Run dbt
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          Sales_analytics:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: Analytics.duckdb
                threads: 1
          EOF
          cd Sales_analytics
          dbt seed
          dbt run
          dbt test

      - name: Export to Power BI CSVs
        run: python scripts/export_to_powerbi.py

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data_processed/
          git diff --staged --quiet || git commit -m "Auto refresh: updated pipeline output [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
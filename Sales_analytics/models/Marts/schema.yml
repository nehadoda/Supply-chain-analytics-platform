version: 2

models:
  - name: fct_sales_with_currency
    description: "Sales data joined with currency rates for multi-currency analysis"
    columns:
      - name: product
        tests: [not_null]
      - name: net_sales_converted
        tests: [not_null]

  - name: fct_price_comparison
    description: "Compares internal prices vs competitor prices"
    
  - name: fct_profit_analysis
    description: "Profit margin analysis by product, segment and country"
    
  - name: fct_currency_impact
    description: "Revenue impact of currency fluctuations by country"